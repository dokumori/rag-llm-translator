services:
  chroma:
    container_name: chroma
    image: chromadb/chroma:1.5.8
    # Load defaults first, then let .env override.
    env_file:
      - .env.defaults
      - .env
    environment:
      - CHROMA_PATH=/data
      - ANONYMIZED_TELEMETRY=FALSE
    networks:
      - app_network
    ports:
      - "${CHROMA_PORT}:8000"
    volumes:
      - chroma_data:/data
      - ./config/chroma/config.yaml:/config.yaml:ro
    healthcheck:
      test: [ "CMD-SHELL", "grep -q '00000000:1F40 00000000:0000 0A' /proc/net/tcp || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  rag-proxy:
    build:
      context: .
      dockerfile: ./services/rag-proxy/Dockerfile
    container_name: rag-proxy
    # Load defaults first, then let .env override.
    env_file:
      - .env.defaults
      - .env
    environment:
      - PYTHONPATH=/app/src:/app/shared
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
      - LLM_API_TOKEN=${LLM_API_TOKEN}
      - LLM_BASE_URL=${LLM_BASE_URL}
      - CHROMA_HOST=chroma
      - CHROMA_PORT=8000
      - HF_HOME=/app/data/cache/huggingface
      - TORCHINDUCTOR_CACHE_DIR=/tmp/torchinductor
      - TORCH_COMPILE_DISABLE=1
      - HF_HUB_OFFLINE=${HF_HUB_OFFLINE:-1}
      - EMBEDDING_MODEL_NAME=${EMBEDDING_MODEL_NAME}
      - PROMPTS_DIR=/app/config/prompts
      - MODELS_CONFIG_PATH=/app/config/models/models.json
      - CUSTOM_MODELS_CONFIG_PATH=/app/config/models/custom/models.json
      - GLOSSARY_COLLECTION=app_glossary
      - TM_COLLECTION=app_tm
      # RAG tuning parameters
      - TM_THRESHOLD=${TM_THRESHOLD}
      - GLOSSARY_THRESHOLD=${GLOSSARY_THRESHOLD}
      - RAG_STRICT_DISTANCE_THRESHOLD=${RAG_STRICT_DISTANCE_THRESHOLD}
    ports:
      - "5001:5000"
    volumes:
      - ./config:/app/config:ro
      - ./services/rag-proxy/src:/app/src
      - ./services/shared/src:/app/shared:ro
      - ./tests:/app/tests:ro
      - ./data/cache/huggingface:/app/data/cache/huggingface
    depends_on:
      chroma:
        # Ensures rag-proxy only starts after ChromaDB is ready to accept connections
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "grep -q '00000000:1388 00000000:0000 0A' /proc/net/tcp || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - app_network
    user: "${UID}:${GID}"

  toolbox:
    container_name: toolbox
    build:
      context: .
      dockerfile: ./services/toolbox/Dockerfile
    # Keep it running so we can 'docker exec' into it, or use 'profiles' to run on demand
    command: tail -f /dev/null
    # Load defaults first, then let .env override.
    env_file:
      - .env.defaults
      - .env
    environment:
      - LLM_API_TOKEN=${LLM_API_TOKEN}
      - LLM_BASE_URL=${LLM_BASE_URL}
      - BULK_SIZE=${BULK_SIZE}
      - CHROMA_HOST=chroma
      - CHROMA_PORT=8000
      - EMBEDDING_MODEL_NAME=${EMBEDDING_MODEL_NAME}
      - TM_SOURCE_DIR=/app/tm_source
      - RAG_ANALYSIS_DIR=/app/data/rag-analysis
      - OPENAI_BASE_URL=http://rag-proxy:5000/v1
      - RAG_PROXY_URL=http://rag-proxy:5000
      - POST_PROCESS_INPUT_DIR=/app/po/output
      - POST_PROCESSING_ENABLED=${POST_PROCESSING_ENABLED:-false}
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONPATH=/app/src:/app/shared:/app/services/rag-proxy/src
      - PYTHONUNBUFFERED=1
      - MODELS_CONFIG_PATH=/app/config/models/models.json
      - CUSTOM_MODELS_CONFIG_PATH=/app/config/models/custom/models.json
      - RAG_STRICT_DISTANCE_THRESHOLD=${RAG_STRICT_DISTANCE_THRESHOLD}
    networks:
      - app_network
    user: "${UID}:${GID}"
    volumes:
      - ./config:/app/config:ro
      - ./data/rag-analysis:/app/data/rag-analysis
      - ./data/logs:/app/data/logs
      - ./data/tm_source:/app/tm_source:ro
      - ./data/translations:/app/po
      - ./services/rag-proxy/src:/app/services/rag-proxy/src:ro
      - ./services/toolbox/src:/app/src:ro
      - ./services/shared/src:/app/shared:ro
      - ./tests:/app/tests:ro
    depends_on:
      chroma:
        # Prevents toolbox scripts from failing due to database connection errors during boot
        condition: service_healthy
      rag-proxy:
        condition: service_healthy

  chromadb-ui:
    build:
      context: https://github.com/BlackyDrum/chromadb-ui.git
      dockerfile: Dockerfile
    container_name: chromadb-ui
    ports:
      - "3001:80"
    networks:
      - app_network
    depends_on:
      chroma:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # LiteLLM Gateway (optional — start with: docker compose --profile gateway up -d)
  # ---------------------------------------------------------------------------
  litellm:
    image: ghcr.io/berriai/litellm:v1.83.14-stable
    container_name: litellm
    profiles:
      - gateway
    ports:
      - "4000:4000"
    volumes:
      - ./config/litellm:/app/config:ro
    extra_hosts:
      # Allows the gateway to reach Ollama running on the host machine.
      # Needed on Linux; harmless no-op on macOS/Windows.
      - "host.docker.internal:host-gateway"
    environment:
      - LITELLM_CONFIG=/app/config/config.yaml
      # Provider API keys — set whichever you use in .env
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - MISTRAL_API_KEY=${MISTRAL_API_KEY:-}
      # Custom OpenAI-compatible endpoint (amazee.ai, vLLM, etc.)
      - CUSTOM_LLM_API_KEY=${CUSTOM_LLM_API_KEY:-}
      - CUSTOM_LLM_BASE_URL=${CUSTOM_LLM_BASE_URL:-}
      # Ollama (local models on host)
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-}
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        if [ ! -f /app/config/config.yaml ]; then
          echo ""
          echo "❌  LiteLLM gateway config not found: config/litellm/config.yaml"
          echo ""
          echo "    To set it up, copy the example file and edit it:"
          echo "      cp config/litellm/config.example.yaml config/litellm/config.yaml"
          echo ""
          echo "    Then restart the gateway:"
          echo "      docker compose --profile gateway up -d"
          echo ""
          exit 1
        fi
        exec litellm --config /app/config/config.yaml --port 4000
    networks:
      - app_network
    healthcheck:
      test: ["CMD-SHELL", "grep -q '00000000:0FA0 00000000:0000 0A' /proc/net/tcp || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  app_network:
    driver: bridge

volumes:
  chroma_data:
