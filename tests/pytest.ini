[pytest]
# addopts allows adding default command-line options.
# '-p no:cacheprovider' disables the cache provider plugin to prevent '.pytest_cache'
# directory creation, avoiding permission issues in Docker-mounted volumes.
addopts = -p no:cacheprovider

# Standard test directories plus the custom plugin tree.
# Plugin submodules live under services/toolbox/src/plugins/custom/ and are
# expected to ship their own tests/ subdirectory alongside the plugin code.
# pytest discovers those tests automatically via this testpaths entry.
testpaths =
    unit
    integration
    ../services/toolbox/src/plugins/custom

pythonpath =
    stubs
    ../services/rag-proxy/src
    ../services/shared/src
    ../services/toolbox/src
    # Each plugin submodule root is added here so that a plugin's tests/ folder
    # can import sibling modules without extra sys.path manipulation.
    ../services/toolbox/src/plugins/custom
    ../bin/lib

markers =
    integration: marks tests that require the Docker stack (deselect with '-m "not integration"')
